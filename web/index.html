<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figma UI User Guider</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="page">
      <h1 class="page__title">Figma UI User Guider</h1>
      <p class="page__subtitle">Вставьте ссылку на макет — агент сгенерирует руководство пользователя</p>

      <section class="card">
        <label class="field">
          <span class="field__label">Ссылка на макет</span>
          <input
            class="field__input"
            id="figma-url"
            type="url"
            placeholder="https://www.figma.com/file/..."
          />
        </label>

        <div class="field-row">
          <label class="field">
            <span class="field__label">Детализация</span>
            <div class="select">
              <select class="field__input" id="detail-level" aria-label="Уровень детализации">
                <option value="brief">Краткий</option>
                <option value="detailed">Подробный</option>
              </select>
            </div>
          </label>

          <label class="field">
            <span class="field__label">Аудитория</span>
            <div class="select">
              <select class="field__input" id="audience" aria-label="Целевая аудитория">
                <option value="user">Пользователь</option>
                <option value="developer">Разработчик</option>
                <option value="engineer">Инженер</option>
              </select>
            </div>
          </label>
        </div>

        <button class="button button--generate" id="generate-btn" type="button">
          Сгенерировать руководство ↗
        </button>
      </section>

      <section class="result" id="result-section" hidden>
        <h2 class="result__title">Результат генерации</h2>
        <div class="result__box" id="result-box"></div>
        <button class="button button--outline" id="download-btn" type="button">
          Скачать результат
        </button>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
